<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BCSO Manager | Agents</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="dashboard">


    <!-- MENU UNIQUE -->

    <div id="sidebar"></div>



    <!-- CONTENU -->

    <main class="content">


        <header class="topbar">


            <div>

                <h1>
                    Gestion des Agents
                </h1>


                <p>
                    Personnel du Blaine County Sheriff's Office
                </p>

            </div>



            <button class="btn-principal"
                    onclick="ajouterAgent()">


                <i class="fa-solid fa-user-plus"></i>

                Ajouter un agent


            </button>


        </header>



        <!-- RECHERCHE -->

        <section class="bloc">


            <div class="toolbar">


                <input
                    type="text"
                    id="search"
                    placeholder="Rechercher un agent...">


                <select id="filtreService">


                    <option value="">
                        Toutes les unités
                    </option>


                </select>


            </div>


        </section>        <br>


        <!-- LISTE DES AGENTS -->

        <section class="bloc">


            <h2>

                <i class="fa-solid fa-users"></i>

                Liste des agents

            </h2>



            <div class="table-responsive">


                <table class="agent-table">


<thead>

<tr>

    <th style="width:90px;">Matricule</th>

    <th style="width:160px;">Nom</th>

    <th style="width:160px;">Prénom</th>

    <th style="width:170px;">Grade</th>

    <th style="width:90px;">État-Major</th>

    <th style="width:90px;">MARY / HP</th>

    <th style="width:70px;">K9</th>

    <th style="width:70px;">CID</th>

    <th style="width:70px;">AMD</th>

    <th style="width:120px;">Sheriff Academy</th>

    <th style="width:120px;">Statut</th>

    <th style="width:170px;">Actions</th>

</tr>

</thead>



                    <tbody id="listeAgents">


                        <tr>

                            <td colspan="7" class="center">

                                Chargement des agents...

                            </td>


                        </tr>


                    </tbody>


                </table>


            </div>


        </section>




        <!-- FENÊTRE AGENT -->


        <div id="modalAgent" class="modal hidden">


            <div class="modal-content">


                <div class="modal-header">


                    <h2>

                        <i class="fa-solid fa-user-plus"></i>

                        Ajouter un agent

                    </h2>



                    <<button
    type="button"
    class="btn-fermer"
    onclick="fermerModal()">

    <i class="fa-solid fa-xmark"></i>

</button>


                </div>




                <form id="formAgent">


                    <div class="form-grid">                        <div class="form-group">

                            <label>Matricule</label>

                            <input
                                type="text"
                                id="matricule"
                                required>

                        </div>



                        <div class="form-group">

    <label>Nom RP</label>

    <input
        type="text"
        id="nom"
        placeholder="Nom"
        required>

</div>

<div class="form-group">

    <label>Prénom RP</label>

    <input
        type="text"
        id="prenom"
        placeholder="Prénom"
        required>

</div>



                        <div class="form-group">

                            <label>Grade</label>

                            <select id="grade" required>

                                <option value="">
                                    Choisir
                                </option>
<option value="">Choisir</option>

<option>Sheriff</option>
<option>Sheriff Adjoint</option>

<option disabled>──────── Sheriff Office ────────</option>

<option>Commandant</option>
<option>Capitaine</option>
<option>Lieutenant</option>
<option>Sergeant II</option>
<option>Sergeant I</option>
<option>Deputy Senior</option>
<option>Deputy III</option>
<option>Deputy II</option>
<option>Deputy I</option>
<option>Rookie</option>
                            </select>

                        </div>
<div class="form-group full">

    <label>Affectations</label>

    <div class="unites-grid">

        <label class="check-unite">
            <input type="checkbox" id="etat_major">
            État-Major
        </label>

        <label class="check-unite">
            <input type="checkbox" id="mary_hp">
            MARY / HP
        </label>

        <label class="check-unite">
            <input type="checkbox" id="k9">
            K9
        </label>

        <label class="check-unite">
            <input type="checkbox" id="cid">
            CID
        </label>

        <label class="check-unite">
            <input type="checkbox" id="amd">
            AMD
        </label>

        <label class="check-unite">
            <input type="checkbox" id="sheriff_academy">
            Sheriff Academy
        </label>

    </div>

</div>

                        <div class="form-group">

                            <label>Téléphone</label>

                            <input
                                type="text"
                                id="telephone">

                        </div>
<div class="form-group">

    <label>Badge</label>

    <input
        type="text"
        id="badge">

</div>

<div class="form-group">

    <label>Date d'entrée</label>

    <input
        type="date"
        id="dateEntree">

</div>

<div class="form-group">

    <label>Supérieur</label>

    <input
        type="text"
        id="superieur">

</div>

<div class="form-group">

    <label>Dernière promotion</label>

    <input
        type="date"
        id="datePromotion">

</div>

<div class="form-group full">

    <label>Notes</label>

    <textarea
        id="notes"
        rows="5"></textarea>

</div>


                        <div class="form-group">

                            <label>Statut</label>

                            <select id="statut">

                                <option>En service</option>
                                <option>Hors service</option>
                                <option>Congé</option>
                                <option>Suspendu</option>

                            </select>

                        </div>


                    </div>



                    <div class="modal-footer">

    <button
        type="submit"
        class="btn-principal">

        <i class="fa-solid fa-floppy-disk"></i>

        Enregistrer

    </button>

</div>


                </form>


            </div>


        </div>



    </main>


</div>




<script src="js/menu.js"></script>

<script src="js/agents.js"></script>


</body>

</html>
