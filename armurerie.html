<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>BCSO Manager | Armurerie</title>


<link rel="stylesheet" href="css/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>



<body>


<div class="dashboard">


    <!-- MENU UNIQUE -->

    <div id="sidebar"></div>



    <!-- CONTENU -->

    <main class="content">


        <header class="topbar">


            <div>

                <h1>

                    <i class="fa-solid fa-gun"></i>

                    Armurerie

                </h1>


                <p>

                    Gestion de l'équipement BCSO

                </p>


            </div>



            <button 
                class="btn-principal"
                onclick="ajouterArme()">


                <i class="fa-solid fa-plus"></i>

                Ajouter une arme


            </button>


        </header>




        <section class="bloc">


            <h2>

                <i class="fa-solid fa-boxes-stacked"></i>

                Inventaire des armes

            </h2>



            <div id="listeArmes">


                <p class="center">

                    Chargement de l'armurerie...

                </p>


            </div>


        </section>        <!-- MODAL AJOUT ARME -->


       
            <div class="modal-content">


                <div class="modal-header">


                    <h2>

                        <i class="fa-solid fa-gun"></i>

                        Ajouter une arme

                    </h2>



                    <button onclick="fermerModalArme()">

                        &times;

                    </button>


                </div>




                <form id="formArme">



                    <div class="form-grid">



                        <div class="form-group">


                            <label>
                                Nom de l'arme
                            </label>


                            <input
                                type="text"
                                id="nomArme"
                                required>


                        </div>




                        <div class="form-group">


                            <label>
                                Type
                            </label>


                            <input
                                type="text"
                                id="typeArme"
                                placeholder="Pistolet, Fusil...">


                        </div>




                        <div class="form-group">


                            <label>
                                Calibre
                            </label>


                            <input
                                type="text"
                                id="calibreArme">


                        </div>




                        <div class="form-group">


                            <label>
                                Quantité
                            </label>


                            <input
                                type="number"
                                id="quantiteArme"
                                value="1">


                        </div>



                    </div>





                    <button
                        class="btn-principal"
                        type="submit">


                        <i class="fa-solid fa-save"></i>


                        Enregistrer



                    </button>



                </form>



            </div>


        </div>        <!-- MODAL AJOUT ARME -->


        <div id="modalArme" class="modal hidden">


            <div class="modal-content">


                <div class="modal-header">


                    <h2>

                        <i class="fa-solid fa-gun"></i>

                        Ajouter une arme

                    </h2>



                    <button onclick="fermerModalArme()">

                        &times;

                    </button>


                </div>




                <form id="formArme">



                    <div class="form-grid">



                        <div class="form-group">


                            <label>
                                Nom de l'arme
                            </label>


                            <input
                                type="text"
                                id="nomArme"
                                required>


                        </div>




                        <div class="form-group">


                            <label>
                                Type
                            </label>


                            <input
                                type="text"
                                id="typeArme"
                                placeholder="Pistolet, Fusil...">


                        </div>




                        <div class="form-group">


                            <label>
                                Calibre
                            </label>


                            <input
                                type="text"
                                id="calibreArme">


                        </div>




                        <div class="form-group">


                            <label>
                                Quantité
                            </label>


                            <input
                                type="number"
                                id="quantiteArme"
                                value="1">


                        </div>



                    </div>





                    <button
                        class="btn-principal"
                        type="submit">


                        <i class="fa-solid fa-save"></i>


                        Enregistrer



                    </button>



                </form>



            </div>


        </div>        </section>


    </main>


</div>



<!-- SCRIPTS -->

<script src="js/menu.js"></script>

<script src="js/armurerie.js"></script>

<!-- ========================================= -->
<!-- MODAL ATTRIBUTION D'ARME -->
<!-- ========================================= -->

<div id="modalAttribution" class="modal hidden">

    <div class="modal-content">

        <span class="close"
              onclick="fermerAttribution()">&times;</span>

        <h2>Attribuer une arme</h2>

        <input type="hidden" id="armeSelectionnee">

        <div class="form-group">

            <label>Agent</label>

            <select id="agentSelection"></select>

        </div>

        <div class="form-group">

            <label>Quantité</label>

            <input
                type="number"
                id="quantiteAttribution"
                value="1"
                min="1">

        </div>

        <button
            class="btn-principal"
            onclick="attribuerArme()">

            <i class="fa-solid fa-user-plus"></i>

            Attribuer

        </button>

    </div>

</div>

</body>

</html>
