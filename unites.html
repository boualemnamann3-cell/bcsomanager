<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BCSO Manager | Unités</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <div id="sidebar"></div>

    <main class="content">

        <header class="topbar">

            <div>

                <h1>Gestion des unités</h1>

                <p>Administration des unités du BCSO</p>

            </div>

            <button class="btn-principal" onclick="ouvrirModal()">

                <i class="fa-solid fa-plus"></i>

                Ajouter une unité

            </button>

        </header>

        <section class="bloc">

            <div id="listeUnites">

                <p class="center">
                    Aucune unité enregistrée.
                </p>

            </div>

        </section>

    </main>

</div>
<!-- ==========================
     MODAL AJOUT UNITÉ
========================== -->

<div id="modalUnite" class="modal hidden">

    <div class="modal-content">

        <h2>
            <i class="fa-solid fa-shield-halved"></i>
            Ajouter une unité
        </h2>

        <form id="formUnite">

            <label>Nom de l'unité</label>

            <input
                type="text"
                id="nomUnite"
                placeholder="Ex : K9"
                required>

            <label>Description</label>

            <textarea
                id="descriptionUnite"
                placeholder="Description de l'unité"></textarea>

            <label>Chef de l'unité</label>

            <input
                type="text"
                id="chefUnite"
                placeholder="Nom du responsable">

            <label>Couleur</label>

            <input
                type="color"
                id="couleurUnite"
                value="#c4a000">

            <button
                class="btn-principal"
                type="submit">

                Créer l'unité

            </button>

            <button
                type="button"
                class="btn-secondaire"
                onclick="fermerModal()">

                Annuler

            </button>

        </form>

    </div>

</div>

<script src="js/menu.js"></script>
<script src="js/unites.js"></script>

</body>
</html>
